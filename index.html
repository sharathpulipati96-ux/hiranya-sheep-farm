<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiranya Sheep Farm</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
}

.navbar-brand {
    font-weight: bold;
    font-size: 1.5rem;
    color: #00ff88 !important;
}

.hero {
    background: url('https://images.unsplash.com/photo-1601758123927-196c7c1e0d89') center/cover no-repeat;
    height: 85vh;
    color: white;
    display: flex;
    align-items: center;
    text-align: center;
}

.hero-overlay {
    background: rgba(0,0,0,0.65);
    width: 100%;
    padding: 60px 20px;
}

.highlight {
    color: #00ff88;
    font-weight: bold;
}

.card img {
    height: 220px;
    object-fit: cover;
}

.price {
    color: green;
    font-weight: bold;
}

.whatsapp-btn {
    background: #25D366;
    color: white;
}

footer {
    background: #111;
    color: #ccc;
    padding: 20px;
    text-align: center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">🐑 Hiranya Sheep Farms</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="hero-overlay">
<h1 class="display-4">Welcome to <span class="highlight">Hiranya Sheep Farm</span></h1>
<p>Healthy Breeds • Direct Farm Sales • Best Prices</p>
<a href="#catalog" class="btn btn-success btn-lg mt-3">Explore Sheep</a>
</div>
</section>

<!-- CATALOG -->
<section id="catalog" class="py-5">
<div class="container">
<h2 class="text-center mb-4">Available Sheep</h2>
<div class="row" id="sheepContainer"></div>
</div>
</section>

<!-- CONTACT -->
<section class="bg-light py-5">
<div class="container">
<h2 class="text-center mb-4">Contact / Inquiry</h2>
<div class="row justify-content-center">
<div class="col-md-6">

<form onsubmit="sendWhatsApp(event)">
<input type="text" id="name" class="form-control mb-3" placeholder="Your Name" required>
<input type="tel" id="phone" class="form-control mb-3" placeholder="Phone Number" required>
<textarea id="message" class="form-control mb-3" rows="4" placeholder="Message"></textarea>

<button class="btn btn-success w-100">Send via WhatsApp</button>
</form>

</div>
</div>
</div>
</section>

<footer>
<p>© 2026 Hiranya Sheep Farm | All Rights Reserved</p>
</footer>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
// 🐑 Dynamic Data (Later replace with API/backend)
const sheepData = [
    {
        name: "Boer Sheep",
        weight: "45kg",
        age: "1.5 Years",
        price: 12000,
        img: "https://images.unsplash.com/photo-1548767797-d8c844163c4c"
    },
    {
        name: "Dorper Sheep",
        weight: "50kg",
        age: "2 Years",
        price: 15000,
        img: "https://images.unsplash.com/photo-1516466723877-e4ec1d736c8a"
    },
    {
        name: "Local Breed",
        weight: "35kg",
        age: "1 Year",
        price: 9000,
        img: "https://images.unsplash.com/photo-1500595046743-cd271d694d30"
    }
];

// Render sheep dynamically
const container = document.getElementById("sheepContainer");

sheepData.forEach((sheep, index) => {
    container.innerHTML += `
    <div class="col-md-4 mb-4">
        <div class="card shadow">
            <img src="${sheep.img}" class="card-img-top">
            <div class="card-body">
                <h5>${sheep.name}</h5>
                <p>Weight: ${sheep.weight}</p>
                <p>Age: ${sheep.age}</p>
                <p class="price">₹${sheep.price}</p>

                <button class="btn btn-success w-100 mb-2" onclick="payNow(${sheep.price})">Pay Now</button>

                <a href="https://wa.me/919963431337?text=I want to order ${sheep.name} - ₹${sheep.price}" 
                   class="btn whatsapp-btn w-100">
                   Order via WhatsApp
                </a>
            </div>
        </div>
    </div>`;
});

// WhatsApp form submit
function sendWhatsApp(e){
    e.preventDefault();
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let msg = document.getElementById("message").value;

    let url = `https://wa.me/YOUR_PHONE_NUMBER?text=Name:${name}, Phone:${phone}, Message:${msg}`;
    window.open(url, "_blank");
}

// Razorpay Payment
function payNow(amount){
    var options = {
        "key": "YOUR_RAZORPAY_KEY",
        "amount": amount * 100,
        "currency": "INR",
        "name": "Hiranya Sheep Farm",
        "description": "Sheep Purchase",
        "handler": function (response){
            alert("Payment Successful: " + response.razorpay_payment_id);
        }
    };
    var rzp = new Razorpay(options);
    rzp.open();
}
</script>

</body>
</html>
